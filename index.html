<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <!-- Начальный заголовок -->
    <title>Расписание</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./data.js"></script>
    <script src="./app.js" defer></script>
</head>
<body>
    <div id="app-container">
        <div id="page-main" class="page active">
            <div class="main-title">
                <!-- Заголовки теперь вставляются из data.js -->
                <h1 id="session-title"></h1>
                <h3 id="session-dates"></h3>
            </div>
            <div class="main-buttons">
                <!-- Добавлены атрибуты data-title для смены заголовка страницы -->
                <button class="main-button" data-target-page="zis231" data-title="Расписание ЗИС-231">Расписание ЗИС-231</button>
                <button class="main-button" data-target-page="zis232" data-title="Расписание ЗИС-232">Расписание ЗИС-232</button>
                <button class="main-button" data-target-page="png-list" data-title="Оригинальное расписание">Оригинальное расписание</button>
            </div>
            <div class="main-notice">
                Актуально на 13.06.2025 г.
                <br />Возможны изменения, проверяйте на сайте СибГИУ. <br />Обновления не происходят автоматически!
            </div>
        </div>

        <div id="page-zis231" class="page">
            <ul class="schedule-list" id="schedule-list-zis231"></ul>
        </div>

        <div id="page-zis232" class="page">
            <ul class="schedule-list" id="schedule-list-zis232"></ul>
        </div>

        <div id="page-png-list" class="page">
            <div class="png-list-container" id="png-list-container">
            </div>
        </div>
    </div>

    <!-- Модальное окно для просмотра изображений -->
    <div id="image-viewer-modal" class="image-viewer-modal">
        <img class="image-viewer-content" id="image-viewer-content">
    </div>

</body>
</html>
